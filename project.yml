name: E2HTranslatorMac
options:
  bundleIdPrefix: com.e2h
targets:
  E2HTranslatorMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
  E2HTranslatorMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Tests
    dependencies:
      - target: E2HTranslatorMac
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
